    <main>
        <h1>Deixe seu contato!</h1>
        <hr>
        <div class="form-box">
            <form>
            <label for="name">Nome completo: </label>
            <input id="name" name="nome" type="text" placeholder="Nome completo">
            <br/>

            <label for="email">Email: </label>
            <input id="email" name="email" type="text" placeholder="Email">
            <br/>

            <label for="mensagem">Deixe uma mensagem: </label>
            <textarea id="mensagem" name="mensagem" type="text" placeholder="Sua mensagem"></textarea>
            <br/>

            <button type="submit">enviar</button>
            </form>  
        </div>    
    </main>
