<!DOCTYPE html>

<head>

<body>
    <header>

    <main>
        <h1>Deixe seu contato!</h1>
        <hr>

        <div class="container-contato">
            <div class="form-box">
                <form id="formContato">
                    <label for="name">Nome completo: </label>
                    <input id="name" name="nome" type="text" placeholder="Nome completo">
                    
                    <label for="email">Email: </label>
                    <input id="email" name="email" type="email" placeholder="Email">
                    
                    <label for="mensagem">Deixe uma mensagem: </label>
                    <textarea id="mensagem" name="mensagem" placeholder="Sua mensagem"></textarea>
                    
                    <button type="submit">enviar</button>
            <p id="msgErro"></p>
            </form>
        </div>
    </main>

    <footer>
        <span>© 2026 - Selton & Clarissa</span>
    </footer>

    <script src="../js/index.js"></script>
    <script src="../js/contato.js"></script>
